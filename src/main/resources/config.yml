# Herobrine Plugin Configuration

enabled: true
appearance:
  # Time in seconds between possible appearances
  frequency: 300
  # Chance of appearing when timer triggers (0.0 - 1.0)
  chance: 0.3

# Effect settings
effects:
  # Enable/disable ambient sounds
  ambient_sounds: true
  # Frequency of ambient sounds (in seconds)
  # - 5: Very frequent
  # - 15: Frequent
  # - 30: Normal (recommended)
  # - 60: Rare
  # - 120: Very rare
  ambient_sound_frequency: 30
  # Chance for ambient sounds to play (0.0 - 1.0)
  # - 0.1: Very rare
  # - 0.3: Rare (recommended)
  # - 0.5: Normal
  # - 0.7: Common
  ambient_sound_chance: 0.3
  # Enable/disable structure manipulation
  structure_manipulation: true
  # Enable/disable stalking behavior
  stalking_enabled: true
  # Maximum distance for stalking (in blocks)
  max_stalk_distance: 50
  # Enable/disable fog effects (uses blindness and darkness)
  fog_enabled: true
  # Fog intensity (0.0 - 1.0)
  # - 0.0: No fog
  # - 0.3: Light fog (recommended)
  # - 0.5: Medium fog
  # - 0.7: Heavy fog
  # - 1.0: Maximum fog (very dark)
  fog_density: 0.3
  # Duration of fog effects in ticks (20 ticks = 1 second)
  fog_duration: 200
  # Enable/disable footstep effects
  footsteps_enabled: true
  # Maximum number of footsteps to create
  max_footsteps: 10
  # Enable/disable torch manipulation
  torch_manipulation: true
  # Radius for torch manipulation (in blocks)
  torch_manipulation_radius: 10
  # Chance to convert torches to redstone torches (0.0 - 1.0)
  torch_conversion_chance: 0.7
  # Chance to remove torches completely (0.0 - 1.0)
  torch_removal_chance: 0.3
  # Enable/disable screen shake effects
  screen_shake_enabled: true
  # Enable/disable flashing text effect during appearances
  flashing_text_enabled: true
  # Enable/disable fake error messages during appearances
  fake_errors_enabled: true
  # Enable/disable maze teleportation (rare, intense disorientation effect)
  maze_teleport_enabled: true
  # Chance for maze teleportation to trigger (0.0 - 1.0)
  maze_teleport_chance: 0.1
  # Enable/disable skinwalker effect (animals mimicking player behavior)
  skinwalker_enabled: true
  # Chance for skinwalker effect during stalking (0.0 - 1.0)
  skinwalker_chance: 0.15
  # Maximum number of animals for skinwalker effect
  skinwalker_max_animals: 3

# Structure settings
structures:
  # Enable/disable individual structure types
  enabled_types:
    sand_pyramids: true
    redstone_caves: true
    stripped_trees: true
    mysterious_tunnels: true
    glowstone_e: true
    wooden_crosses: true
    tripwire_traps: true
    creepy_signs: true
  
  # Chance weights for each structure type (higher number = more common)
  weights:
    sand_pyramids: 15
    redstone_caves: 15
    stripped_trees: 15
    mysterious_tunnels: 15
    glowstone_e: 10
    wooden_crosses: 10
    tripwire_traps: 10
    creepy_signs: 10
  
  # Structure-specific settings
  sand_pyramids:
    size: 5  # Base size of the pyramid
  
  redstone_caves:
    min_length: 15  # Minimum tunnel length
    max_length: 25  # Maximum tunnel length
    torch_interval: 3  # Blocks between torches
  
  mysterious_tunnels:
    min_length: 20  # Minimum tunnel length
    max_length: 40  # Maximum tunnel length
    depth: 10  # Blocks below surface
  
  stripped_trees:
    radius: 5  # Radius to search for trees
    max_height: 10  # Maximum height to strip leaves
  
  glowstone_e:
    depth: 5  # Blocks below surface
  
  wooden_crosses:
    height: 3  # Height of the cross
  
  tripwire_traps:
    tnt_count: 4  # Number of TNT blocks

# Paranoia system settings
paranoia:
  # Enable/disable the paranoia system
  enabled: true
  # Base exposure level for new players (0.0 - 1.0)
  initial_exposure: 0.1
  # How quickly exposure increases with each encounter (0.0 - 1.0)
  exposure_growth_rate: 0.05
  # Maximum distance for subtle appearances (further than normal appearances)
  far_appearance_distance: 50
  # Enable distant silhouette appearances
  distant_silhouettes: true
  # Enable peripheral vision appearances (only visible when not looking directly)
  peripheral_appearances: true
  # Chance for Herobrine to disappear when looked at directly (0.0 - 1.0)
  vanish_when_seen_chance: 0.8
  # Enable/disable exposure-based effects intensity
  adaptive_effects: true

# Advanced settings
advanced:
  # Debug mode (prints additional information to console)
  debug: false
  # Maximum number of simultaneous appearances
  max_appearances: 1
  # Time in seconds before Herobrine disappears
  appearance_duration: 10
  # Minimum distance from player for appearances (in blocks)
  min_appearance_distance: 15
  # Maximum distance from player for appearances (in blocks)
  max_appearance_distance: 25
  # Number of attempts to find a valid spawn location (10-100)
  # Increase this if Herobrine fails to spawn in complex terrain
  # Note: server entity-activation-range.misc (spigot.yml) must be >= max_appearance_distance
  spawn_attempts: 30

# ============================================================
# PHASE 1: Pacing & Atmosphere (NEW)
# These systems create a deliberate horror experience instead
# of random events. Herobrine's haunting follows a cycle:
# DORMANT → SUBTLE → ACTIVE → INTENSE → CLIMAX → COOLDOWN
# ============================================================

# Pacing system - controls the rhythm of haunting
pacing:
  # Enable/disable the pacing system
  # When disabled, all effects happen randomly as before
  enabled: true
  # Minutes of silence after server starts before any haunting begins
  # This lets players settle in before the horror starts
  warmup_minutes: 3
  # Duration of each phase in SECONDS
  phase_durations:
    # DORMANT: Nothing happens. Player feels safe.
    dormant: 120
    # SUBTLE: Ambient sounds, subtitles, pet reactions. No visual sightings.
    subtle: 300
    # ACTIVE: Distant sightings, world manipulation, footsteps.
    active: 600
    # INTENSE: Close encounters, stalking, structures, torch manipulation.
    intense: 300
    # CLIMAX: Direct confrontation, screen shake, flashing text.
    climax: 120
    # COOLDOWN: Herobrine backs off. Player recovers.
    cooldown: 300

# World manipulation - environmental horror effects
world_manipulation:
  # Master toggle for all world manipulation
  enabled: true
  # Seconds between manipulation checks per player
  interval: 20
  # Chance per check to manipulate something (0.0 - 1.0)
  chance: 0.3
  # Ghost doors - doors open/close on their own
  ghost_doors:
    enabled: true
    # Radius in blocks to search for doors
    radius: 10
  # Candle snuffer - candles go out near the player
  candle_snuffer:
    enabled: true
    # Radius in blocks to search for candles
    radius: 8
  # Painting swap - paintings change when player isn't looking
  painting_swap:
    enabled: true
    # Radius in blocks to search for paintings
    radius: 12

# Caution captions - subtle subtitle messages
subtitles:
  # Enable/disable subtitle messages
  enabled: true
  # Chance per check (every 30 seconds) to send a subtitle (0.0 - 1.0)
  # Lower values = rarer, more impactful messages
  chance: 0.15

# Pet/animal reactions - animals sense Herobrine's presence
pet_reactions:
  # Enable/disable animal reactions
  enabled: true
  # Radius in blocks for animals to detect Herobrine
  radius: 15